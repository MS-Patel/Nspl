{% extends "layout/base.html" %}
{% load static humanize %}

{% block content %}
<div class="flex flex-col space-y-4 py-4">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between">
        <h2 class="text-xl font-medium text-slate-800 dark:text-navy-50">
            Folio to Distributor Mappings
        </h2>
        <div class="mt-2 sm:mt-0 flex space-x-2">
            <a href="{% url 'payouts:folio_mapping_import' %}" class="btn bg-primary font-medium text-white hover:bg-primary-focus focus:bg-primary-focus active:bg-primary-focus/90 dark:bg-accent dark:hover:bg-accent-focus dark:focus:bg-accent-focus dark:active:bg-accent/90">
                <i class="fas fa-file-upload mr-2"></i> Import Mappings
            </a>
        </div>
    </div>

    <div class="card p-4">
        <div id="folio-mapping-grid" class="w-full"></div>
    </div>
</div>
{% endblock %}

{% block javascript %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const grid = new window.Gridjs.Grid({
            columns: [
                { name: 'Folio Number', id: 'folio' },
                { name: 'Distributor', id: 'distributor' },
                {
                    name: 'Broker Code',
                    id: 'broker_code',
                    formatter: (cell) => {
                        return window.Gridjs.html(
                            `<span class="badge rounded-full bg-info/10 text-info dark:bg-info/15">${cell}</span>`
                        );
                    }
                },
                {
                    name: 'Updated At',
                    id: 'updated_at',
                    formatter: (cell) => {
                        return window.Gridjs.html(
                            `<span class="text-slate-400 text-xs">${cell}</span>`
                        );
                    }
                }
            ],
            server: {
                url: window.location.origin + window.location.pathname + '?format=json',
                then: data => data.data
            },
            search: {
                enabled: true
            },
            sort: true,
            pagination: {
                enabled: true,
                limit: 50
            },
            fixedHeader: true,
            className: {
                table: 'w-full text-left border-collapse',
                th: 'bg-slate-50 dark:bg-navy-800 font-semibold text-slate-700 dark:text-navy-100 p-3 border-b border-slate-200 dark:border-navy-500 whitespace-nowrap',
                td: 'p-3 border-b border-slate-100 dark:border-navy-600 text-slate-600 dark:text-navy-200',
                pagination: 'flex items-center justify-between p-4',
                paginationSummary: 'text-sm text-slate-500 dark:text-navy-300',
                paginationButton: 'btn h-8 px-3 rounded-lg p-0 hover:bg-slate-100 focus:bg-slate-100 active:bg-slate-150/80 dark:hover:bg-navy-500 dark:focus:bg-navy-500 dark:active:bg-navy-500/90 mx-1',
                paginationButtonCurrent: 'bg-primary text-white hover:bg-primary-focus focus:bg-primary-focus active:bg-primary-focus/90',
            },
            language: {
                'search': {
                    'placeholder': 'Search Folio or Distributor...'
                }
            }
        }).render(document.getElementById("folio-mapping-grid"));
    });
</script>
{% endblock %}
