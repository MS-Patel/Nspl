{% extends "layout/base.html" %}
{% load widget_tweaks %}

{% block content %}
<div class="flex flex-col space-y-4">
    <div class="flex items-center justify-between">
        <h2 class="text-xl font-medium text-slate-800 dark:text-navy-50">Upload Consolidated Account Statement (CAS)</h2>
    </div>

    <div class="card p-4 sm:p-5">
        <form method="post" enctype="multipart/form-data" class="space-y-4">
            {% csrf_token %}

            {% if form.non_field_errors %}
            <div class="alert flex rounded-lg border border-error px-4 py-4 text-error sm:px-5">
                {{ form.non_field_errors }}
            </div>
            {% endif %}

            <div class="grid grid-cols-1 gap-4">
                <label class="block">
                    <span>CAS PDF File</span>
                    {% render_field form.file class+="form-input w-full mt-1.5" %}
                    {% if form.file.errors %}
                        <span class="text-tiny text-error">{{ form.file.errors.0 }}</span>
                    {% endif %}
                </label>

                <label class="block">
                    <span>Password (Usually PAN)</span>
                    {% render_field form.password class+="form-input w-full mt-1.5" %}
                    <span class="text-tiny text-slate-400">{{ form.password.help_text }}</span>
                    {% if form.password.errors %}
                        <span class="text-tiny text-error">{{ form.password.errors.0 }}</span>
                    {% endif %}
                </label>
            </div>

            <div class="flex justify-end space-x-2">
                <button type="submit" class="btn bg-primary font-medium text-white hover:bg-primary-focus focus:bg-primary-focus active:bg-primary-focus/90 dark:bg-accent dark:hover:bg-accent-focus dark:focus:bg-accent-focus dark:active:bg-accent/90">
                    Upload & Parse
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
