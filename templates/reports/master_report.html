{% extends 'layout/base.html' %}
{% load static %}
{% block title %}{{ report_title }}{% endblock %}

{% block content %}
<div class="my-5 flex h-8 items-center justify-between px-4 sm:px-5">
  <div class="flex items-center space-x-4">
    <h2 class="text-xl font-medium text-slate-800 dark:text-navy-50 lg:text-2xl">
      {{ report_title }}
    </h2>
    <div class="hidden h-full py-1 sm:flex">
      <div class="h-full w-px bg-slate-300 dark:bg-navy-600"></div>
    </div>
    <ul class="hidden flex-wrap items-center space-x-2 sm:flex">
      <li class="flex items-center space-x-2">
        <a class="text-primary transition-colors hover:text-primary-focus dark:text-accent-light dark:hover:text-accent" href="{% url 'reports:dashboard' %}">Reports</a>
        <svg xmlns="http://www.w3.org/2000/svg" class="size-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
        </svg>
      </li>
      <li>Masters</li>
    </ul>
  </div>
</div>

<div class="card p-4">
    <!-- Filters & Actions -->
    <div class="flex items-end justify-between mb-4">
      <input id="filter-input" type="search" placeholder="Search..." class="form-input w-full sm:w-64 rounded-lg border border-slate-300 bg-transparent px-3 py-2 placeholder:text-slate-400/70 hover:border-slate-400 focus:border-primary dark:border-navy-450 dark:hover:border-navy-400 dark:focus:border-accent" />

      <div class="flex items-center space-x-2">
         <!-- Export Button -->
         <div id="dropdown-wrapper-export" class="inline-flex">
            <button
              class="popper-ref btn space-x-2 bg-slate-150 font-medium text-slate-800 hover:bg-slate-200 focus:bg-slate-200 active:bg-slate-200/80 dark:bg-navy-500 dark:text-navy-50 dark:hover:bg-navy-450 dark:focus:bg-navy-450 dark:active:bg-navy-450/90 [&.is-active_svg]:rotate-180">
              <span>Export</span>
              <svg xmlns="http://www.w3.org/2000/svg" class="size-4 transition-transform duration-200" fill="none"
                viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
              </svg>
            </button>
            <div class="popper-root">
              <div
                class="popper-box rounded-md border border-slate-150 bg-white py-1.5 font-inter dark:border-navy-500 dark:bg-navy-700">
                <ul>
                  <li>
                    <a href="#" id="btn-export-csv" class="flex h-8 items-center space-x-3 px-3 pr-8 font-medium tracking-wide outline-hidden transition-all hover:bg-slate-100 hover:text-slate-800 focus:bg-slate-100 focus:text-slate-800 dark:hover:bg-navy-600 dark:hover:text-navy-100 dark:focus:bg-navy-600 dark:focus:text-navy-100">
                      <span>CSV</span>
                    </a>
                  </li>
                  <li>
                    <a href="#" id="btn-export-excel" class="flex h-8 items-center space-x-3 px-3 pr-8 font-medium tracking-wide outline-hidden transition-all hover:bg-slate-100 hover:text-slate-800 focus:bg-slate-100 focus:text-slate-800 dark:hover:bg-navy-600 dark:hover:text-navy-100 dark:focus:bg-navy-600 dark:focus:text-navy-100">
                      <span>Excel</span>
                    </a>
                  </li>
                </ul>
              </div>
            </div>
         </div>
      </div>
    </div>

    <!-- Grid Container -->
    <div id="report_grid"></div>
</div>
{% endblock %}

{% block javascript %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const GridJSExportUtils = (() => {
  const defaultOptions = { filename: 'report', title: 'Report', sheetName: 'Sheet1' };
  function convertDataToRows(data, columns) {
    const headers = columns.map(col => col.name);
    const rows = data.map(row => columns.map(col => (row[col.id] !== undefined ? row[col.id] : '')));
    return [headers, ...rows];
  }
  function exportCsv(data, columns, options = {}) {
    const opts = {...defaultOptions, ...options};
    const rows = convertDataToRows(data, columns);
    const processRow = (row) => row.map(String).map(v => v.replace(/"/g, '""')).map(v => `"${v}"`).join(',');
    const csvContent = rows.map(processRow).join('\r\n');
    const blob = new Blob([csvContent], {type: 'text/csv;charset=utf-8;'});
    triggerDownload(blob, `${opts.filename}.csv`);
  }
  function exportExcel(data, columns, options = {}) {
    const opts = {...defaultOptions, ...options};
    if (typeof XLSX === 'undefined') { alert('SheetJS (XLSX) library not loaded'); return; }
    const rows = convertDataToRows(data, columns);
    const ws = XLSX.utils.aoa_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, opts.sheetName);
    XLSX.writeFile(wb, `${opts.filename}.xlsx`);
  }
  function triggerDownload(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.style.display = 'none';
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    URL.revokeObjectURL(url);
    a.remove();
  }
  return { exportCsv, exportExcel };
})();

document.addEventListener('DOMContentLoaded', () => {
    const tableData = {{ grid_data_json|safe }};
    const reportType = "{{ report_type }}";
    const gridContainer = document.querySelector("#report_grid");

    let columns = [];
    if (reportType === 'distributor') {
        columns = [
            { id: 'name', name: 'Distributor Name' },
            { id: 'arn', name: 'ARN' },
            { id: 'pan', name: 'PAN' },
            { id: 'mobile', name: 'Mobile' },
            { id: 'email', name: 'Email' },
            { id: 'euin', name: 'EUIN' },
            { id: 'rm', name: 'RM' },
            { id: 'parent_name', name: 'Parent Distributor' },
            { id: 'parent_arn', name: 'Parent ARN' },
            { id: 'status', name: 'Status' },
            { id: 'date_joined', name: 'Date Joined' },
            { id: 'last_login', name: 'Last Login' },
        ];
    } else if (reportType === 'rm') {
        columns = [
            { id: 'name', name: 'RM Name' },
            { id: 'code', name: 'Emp Code' },
            { id: 'branch', name: 'Branch' },
            { id: 'branch_code', name: 'Branch Code' },
            { id: 'branch_city', name: 'Branch City' },
            { id: 'branch_state', name: 'Branch State' },
            { id: 'email', name: 'Email' },
            { id: 'status', name: 'Status' },
            { id: 'date_joined', name: 'Date Joined' },
            { id: 'last_login', name: 'Last Login' },
        ];
    } else if (reportType === 'scheme') {
        columns = [
            { id: 'name', name: 'Scheme Name' },
            { id: 'code', name: 'Code' },
            { id: 'rta_code', name: 'RTA Code' },
            { id: 'isin', name: 'ISIN' },
            { id: 'type', name: 'Type' },
            { id: 'category', name: 'Category' },
            { id: 'amc', name: 'AMC' },
            { id: 'min_purchase', name: 'Min Purchase' },
            // New Fields
            { id: 'unique_no', name: 'Unique No' },
            { id: 'amc_scheme_code', name: 'AMC Scheme Code' },
            { id: 'amfi_code', name: 'AMFI Code' },
            { id: 'scheme_plan', name: 'Plan' },
            { id: 'purchase_allowed', name: 'Purchase Allowed' },
            { id: 'purchase_transaction_mode', name: 'Purchase Mode' },
            { id: 'additional_purchase_amount', name: 'Addl Purchase Amt' },
            { id: 'max_purchase_amount', name: 'Max Purchase Amt' },
            { id: 'purchase_amount_multiplier', name: 'Purchase Multiplier' },
            { id: 'purchase_cutoff_time', name: 'Purchase Cutoff' },
            { id: 'redemption_allowed', name: 'Redemption Allowed' },
            { id: 'redemption_transaction_mode', name: 'Redemption Mode' },
            { id: 'min_redemption_qty', name: 'Min Redempt Qty' },
            { id: 'redemption_qty_multiplier', name: 'Redempt Qty Multiplier' },
            { id: 'max_redemption_qty', name: 'Max Redempt Qty' },
            { id: 'min_redemption_amount', name: 'Min Redempt Amt' },
            { id: 'max_redemption_amount', name: 'Max Redempt Amt' },
            { id: 'redemption_amount_multiple', name: 'Redempt Amt Multiplier' },
            { id: 'redemption_cutoff_time', name: 'Redempt Cutoff' },
            { id: 'is_sip_allowed', name: 'SIP Allowed' },
            { id: 'is_stp_allowed', name: 'STP Allowed' },
            { id: 'is_swp_allowed', name: 'SWP Allowed' },
            { id: 'is_switch_allowed', name: 'Switch Allowed' },
            { id: 'start_date', name: 'Start Date' },
            { id: 'end_date', name: 'End Date' },
            { id: 'reopening_date', name: 'Reopening Date' },
            { id: 'face_value', name: 'Face Value' },
            { id: 'settlement_type', name: 'Settlement Type' },
            { id: 'rta_agent_code', name: 'RTA Agent' },
            { id: 'amc_active_flag', name: 'AMC Active' },
            { id: 'dividend_reinvestment_flag', name: 'Div Reinvest Flag' },
            { id: 'amc_ind', name: 'AMC Ind' },
            { id: 'exit_load_flag', name: 'Exit Load Flag' },
            { id: 'exit_load', name: 'Exit Load' },
            { id: 'lock_in_period_flag', name: 'Lock-in Flag' },
            { id: 'lock_in_period', name: 'Lock-in Period' },
            { id: 'channel_partner_code', name: 'Channel Partner Code' },
        ];
    } else if (reportType === 'bank') {
        columns = [
            { id: 'investor_name', name: 'Investor Name' },
            { id: 'pan', name: 'PAN' },
            { id: 'bank_name', name: 'Bank Name' },
            { id: 'account_number', name: 'Account No' },
            { id: 'ifsc_code', name: 'IFSC' },
            { id: 'account_type', name: 'Type' },
            { id: 'branch_name', name: 'Branch' },
            { id: 'is_default', name: 'Default?' },
        ];
    } else if (reportType === 'nominee') {
        columns = [
            { id: 'investor_name', name: 'Investor Name' },
            { id: 'pan', name: 'Investor PAN' },
            { id: 'nominee_name', name: 'Nominee Name' },
            { id: 'relationship', name: 'Relationship' },
            { id: 'percentage', name: 'Percentage' },
            { id: 'date_of_birth', name: 'DOB' },
            { id: 'guardian_name', name: 'Guardian Name' },
            { id: 'guardian_pan', name: 'Guardian PAN' },
            { id: 'nominee_pan', name: 'Nominee PAN' },
            { id: 'address_1', name: 'Address' },
            { id: 'city', name: 'City' },
            { id: 'state', name: 'State' },
            { id: 'pincode', name: 'Pincode' },
            { id: 'country', name: 'Country' },
            { id: 'mobile', name: 'Mobile' },
            { id: 'email', name: 'Email' },
            { id: 'id_type', name: 'ID Type' },
            { id: 'id_number', name: 'ID Number' },
        ];
    }

    const gridConfig = {
      columns: columns.map(c => ({
        id: c.id,
        name: c.name
      })),
      data: tableData,
      sort: true,
      search: false,
      pagination: { limit: 20 },
      className: {
        table: 'is-hoverable w-full text-left',
        tbody: 'text-slate-600 dark:text-navy-200 text-sm',
        thead: 'bg-slate-200 text-slate-800 dark:bg-navy-800 dark:text-navy-100',
      }
    };

    const grid = new Gridjs.Grid(gridConfig).render(gridContainer);

    // Search Logic
    const filterInput = document.getElementById('filter-input');
    filterInput.addEventListener('input', (e) => {
      const keyword = e.target.value.toLowerCase();
      if (!keyword) {
          grid.updateConfig({ data: tableData }).forceRender();
          return;
      }
      const filteredData = tableData.filter(item =>
          Object.values(item).some(val =>
             String(val).toLowerCase().includes(keyword)
          )
      );
      grid.updateConfig({ data: filteredData }).forceRender();
    });

    // Exports
    document.getElementById('btn-export-csv').addEventListener('click', (e) => {
      e.preventDefault();
      GridJSExportUtils.exportCsv(tableData, columns, { filename: `${reportType}_report` });
    });
    document.getElementById('btn-export-excel').addEventListener('click', (e) => {
      e.preventDefault();
      GridJSExportUtils.exportExcel(tableData, columns, { filename: `${reportType}_report`, sheetName: 'Master' });
    });

    // Popper
    const config = {
      placement: "bottom-end",
      modifiers: [{ name: "offset", options: { offset: [0, 4] }}],
    };
    new Popper("#dropdown-wrapper-export", ".popper-ref", ".popper-root", config);
});
</script>
{% endblock %}
