{% extends 'layout/base.html' %}
{% load static %}

{% block content %}
<div class="my-5 flex h-8 items-center justify-between px-4 sm:px-5">
  <div class="flex items-center space-x-4">
    <h2 class="text-xl font-medium text-slate-800 dark:text-navy-50 lg:text-2xl">
      AMC Master
    </h2>
    <div class="hidden h-full py-1 sm:flex">
      <div class="h-full w-px bg-slate-300 dark:bg-navy-600"></div>
    </div>
    <ul class="hidden flex-wrap items-center space-x-2 sm:flex">
      <li class="flex items-center space-x-2">
        <a class="text-primary transition-colors hover:text-primary-focus dark:text-accent-light dark:hover:text-accent" href="#">Products</a>
        <svg xmlns="http://www.w3.org/2000/svg" class="size-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
        </svg>
      </li>
      <li>AMC Master</li>
    </ul>
  </div>
</div>

<div class="card p-4">
  <div class="is-scrollbar-hidden min-w-full overflow-x-auto">
    <table class="is-hoverable w-full text-left">
      <thead>
        <tr>
          <th class="whitespace-nowrap rounded-tl-lg bg-slate-200 px-4 py-3 font-semibold uppercase text-slate-800 dark:bg-navy-800 dark:text-navy-100 lg:px-5">
            #
          </th>
          <th class="whitespace-nowrap bg-slate-200 px-4 py-3 font-semibold uppercase text-slate-800 dark:bg-navy-800 dark:text-navy-100 lg:px-5">
            AMC Name
          </th>
          <th class="whitespace-nowrap bg-slate-200 px-4 py-3 font-semibold uppercase text-slate-800 dark:bg-navy-800 dark:text-navy-100 lg:px-5">
            Code
          </th>
          <th class="whitespace-nowrap rounded-tr-lg bg-slate-200 px-4 py-3 font-semibold uppercase text-slate-800 dark:bg-navy-800 dark:text-navy-100 lg:px-5">
            Status
          </th>
        </tr>
      </thead>
      <tbody>
        {% for amc in amcs %}
        <tr class="border-y border-transparent border-b-slate-200 dark:border-b-navy-500">
          <td class="whitespace-nowrap px-4 py-3 sm:px-5">{{ forloop.counter }}</td>
          <td class="whitespace-nowrap px-4 py-3 sm:px-5 font-medium text-slate-700 dark:text-navy-100">
            {{ amc.name }}
          </td>
          <td class="whitespace-nowrap px-4 py-3 sm:px-5">
            <div class="badge space-x-2 bg-slate-150 text-slate-800 dark:bg-navy-500 dark:text-navy-100">
                <span>{{ amc.code }}</span>
            </div>
          </td>
          <td class="whitespace-nowrap px-4 py-3 sm:px-5">
            <form action="{% url 'products:amc_toggle' amc.pk %}" method="POST" class="inline">
                {% csrf_token %}
                <label class="inline-flex items-center cursor-pointer">
                    <input type="checkbox" value="" class="form-switch h-5 w-10 rounded-full bg-slate-300 before:rounded-full before:bg-slate-50 checked:bg-primary checked:before:bg-white dark:bg-navy-900 dark:before:bg-navy-300 dark:checked:bg-accent" {% if amc.is_active %}checked{% endif %} onchange="this.form.submit()">
                </label>
            </form>
          </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4" class="px-4 py-3 text-center">No AMCs found.</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
