{% extends 'layout/base.html' %}
{% load static %}
{% block css %}
<!-- Add custom CSS here if needed -->
{% endblock %}
{% block content %}
<div class="my-5 flex h-8 items-center justify-between px-4 sm:px-5">
  <div class="flex items-center space-x-4">
        <h2
          class="text-xl font-medium text-slate-800 dark:text-navy-50 lg:text-2xl"
        >
         Scheme Explorer
        </h2>
        <div class="hidden h-full py-1 sm:flex">
          <div class="h-full w-px bg-slate-300 dark:bg-navy-600"></div>
        </div>
        <ul class="hidden flex-wrap items-center space-x-2 sm:flex">
          <li class="flex items-center space-x-2">
            <a
              class="text-primary transition-colors hover:text-primary-focus dark:text-accent-light dark:hover:text-accent"
              href="#"
              >Products</a
            >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="size-4"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9 5l7 7-7 7"
              />
            </svg>
          </li>
          <li>Schemes</li>
        </ul>
      </div>
</div>
<div class="card p-4">
  <div>
    <div class="flex items-end justify-between">
      <input id="filter-input" type="search" placeholder="Search schemes..." class="mb-4 p-2 border rounded form-control" />
      <div class="flex items-end justify-end mb-4 flex-wrap ">
        <div id="dropdown-wrapper6" class="inline-flex">
          <button
            class="popper-ref btn space-x-2 bg-slate-150 font-medium text-slate-800 hover:bg-slate-200 focus:bg-slate-200 active:bg-slate-200/80 dark:bg-navy-500 dark:text-navy-50 dark:hover:bg-navy-450 dark:focus:bg-navy-450 dark:active:bg-navy-450/90 [&.is-active_svg]:rotate-180">
            <span>Export</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="size-4 transition-transform duration-200" fill="none"
              viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
            </svg>
          </button>
          <div class="popper-root">
            <div
              class="popper-box rounded-md border border-slate-150 bg-white py-1.5 font-inter dark:border-navy-500 dark:bg-navy-700">
              <ul>
                <li>
                  <a href="#" id="btn-export-csv"
                    class="flex h-8 items-center space-x-3 px-3 pr-8 font-medium tracking-wide outline-hidden transition-all hover:bg-slate-100 hover:text-slate-800 focus:bg-slate-100 focus:text-slate-800 dark:hover:bg-navy-600 dark:hover:text-navy-100 dark:focus:bg-navy-600 dark:focus:text-navy-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="mt-px size-4.5" fill="none" viewBox="0 0 24 24"
                      stroke="currentColor" stroke-width="1.5">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                      <path stroke-linecap="round" stroke-linejoin="round"
                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                    <span> CSV</span></a>
                </li>
                <li>
                  <a href="#" id="btn-export-excel"
                    class="flex h-8 items-center space-x-3 px-3 pr-8 font-medium tracking-wide outline-hidden transition-all hover:bg-slate-100 hover:text-slate-800 focus:bg-slate-100 focus:text-slate-800 dark:hover:bg-navy-600 dark:hover:text-navy-100 dark:focus:bg-navy-600 dark:focus:text-navy-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="size-4.5" fill="none" viewBox="0 0 24 24"
                      stroke="currentColor" stroke-width="1.5">
                      <path stroke-linecap="round" stroke-linejoin="round"
                        d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                    </svg>
                    <span> Excel</span></a>
                </li>
                <li>
                  <a href="#" id="btn-export-pdf"
                    class="flex h-8 items-center space-x-3 px-3 pr-8 font-medium tracking-wide outline-hidden transition-all hover:bg-slate-100 hover:text-slate-800 focus:bg-slate-100 focus:text-slate-800 dark:hover:bg-navy-600 dark:hover:text-navy-100 dark:focus:bg-navy-600 dark:focus:text-navy-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="size-4.5" fill="none" viewBox="0 0 24 24"
                      stroke="currentColor" stroke-width="1.5">
                      <path stroke-linecap="round" stroke-linejoin="round"
                        d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                    <span> PDF</span></a>
                </li>
                <li>
                  <a href="#" id="btn-copy-clipboard"
                    class="flex h-8 items-center space-x-3 px-3 pr-8 font-medium tracking-wide text-error outline-hidden transition-all hover:bg-error/20 focus:bg-error/20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="size-4.5" fill="none" viewBox="0 0 24 24"
                      stroke="currentColor" stroke-width="1.5">
                      <path stroke-linecap="round" stroke-linejoin="round"
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                    <span> Copy to clipboard</span></a>
                </li>
              </ul>
            </div>
          </div>
        </div>
        <label class="block ml-4 flex items-center">
          <select id="status-filter" class="mt-1.5 w-full">
            <option value="">All Categories</option>
            <option value="EQUITY">Equity</option>
            <option value="DEBT">Debt</option>
            <option value="ELSS">ELSS</option>
            <option value="HYBRID">Hybrid</option>
          </select>
        </label>
      </div>
    </div>
    <div id="scheme_list"></div>
  </div>
</div>
{% endblock %}

{% block javascript %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<script>
// Inline Export Utils
const GridJSExportUtils = (() => {
  const defaultOptions = { filename: 'report', title: 'Report', sheetName: 'Sheet1' };
  function convertDataToRows(data, columns) {
    const headers = columns.map(col => col.name);
    const rows = data.map(row => columns.map(col => (row[col.id] !== undefined ? row[col.id] : '')));
    return [headers, ...rows];
  }
  function exportCsv(data, columns, options = {}) {
    const opts = {...defaultOptions, ...options};
    const rows = convertDataToRows(data, columns);
    const processRow = (row) => row.map(String).map(v => v.replace(/"/g, '""')).map(v => `"${v}"`).join(',');
    const csvContent = rows.map(processRow).join('\r\n');
    const blob = new Blob([csvContent], {type: 'text/csv;charset=utf-8;'});
    triggerDownload(blob, `${opts.filename}.csv`);
  }
  function exportExcel(data, columns, options = {}) {
    const opts = {...defaultOptions, ...options};
    if (typeof XLSX === 'undefined') { alert('SheetJS (XLSX) library not loaded'); return; }
    const rows = convertDataToRows(data, columns);
    const ws = XLSX.utils.aoa_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, opts.sheetName);
    XLSX.writeFile(wb, `${opts.filename}.xlsx`);
  }
  async function exportPdf(data, columns, options = {}) {
    const opts = {...defaultOptions, ...options};
    if (typeof jspdf === 'undefined' && typeof window.jspdf === 'undefined') { alert('jsPDF library not loaded'); return; }
    const jsPDF = (typeof jspdf !== 'undefined') ? jspdf.jsPDF : window.jspdf.jsPDF;
    const doc = new jsPDF();
    doc.setFontSize(16);
    doc.text(opts.title, 14, 20);
    const headers = columns.map(col => col.name);
    const body = data.map(row => columns.map(col => row[col.id] || ''));
    if (doc.autoTable) {
      doc.autoTable({ startY: 30, head: [headers], body: body });
      doc.save(`${opts.filename}.pdf`);
    } else { alert('jsPDF autotable plugin not found.'); }
  }
  function copyToClipboard(data, columns) {
    const rows = convertDataToRows(data, columns);
    const tsv = rows.map(row => row.join('\t')).join('\n');
    navigator.clipboard.writeText(tsv).then(() => alert('Table data copied')).catch(() => alert('Failed to copy'));
  }
  function triggerDownload(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.style.display = 'none';
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    URL.revokeObjectURL(url);
    a.remove();
  }
  return { exportCsv, exportExcel, exportPdf, copyToClipboard };
})();

  document.addEventListener('DOMContentLoaded', () => {
    const tableData = {{ grid_data_json|safe }};
    const gridContainer = document.querySelector("#scheme_list");
    const investUrl = "{% url 'investments:order_create' %}";

    const gridConfig = {
      columns: [
        { id: "id", hidden: true },
        {
          id: "name",
          name: "Scheme Name",
          formatter: (cell) => Gridjs.html(`<span class="font-medium text-slate-700 dark:text-navy-100">${cell}</span>`)
        },
        { id: "scheme_code", name: "Code" },
        { id: "rta_code", name: "RTA Code" },
        { id: "isin", name: "ISIN" },
        { id: "category", name: "Category" },
        { id: "scheme_type", name: "Type" },
        {
            id: "min_purchase",
            name: "Min Inv.",
            formatter: (cell) => `₹ ${cell.toLocaleString('en-IN')}`
        },
        {
            id: "action",
            name: "Action",
            formatter: (cell, row) => {
                const schemeId = row.cells[0].data; // id is 1st column
                return Gridjs.html(`
                    <a href="${investUrl}?scheme_id=${schemeId}"
                       class="btn h-8 rounded-full bg-primary/10 px-3 text-xs+ font-medium text-primary hover:bg-primary/20 focus:bg-primary/20 active:bg-primary/25 dark:bg-accent-light/10 dark:text-accent-light dark:hover:bg-accent-light/20 dark:focus:bg-accent-light/20 dark:active:bg-accent-light/25">
                       Invest
                    </a>
                `);
            }
        }
      ],
      data: tableData,
      sort: true,
      search: false, // Custom search below
      pagination: {
        limit: 10
      },
      className: {
        table: 'is-hoverable w-full text-left',
        tbody: 'text-slate-600 dark:text-navy-200',
        thead: 'bg-slate-200 text-slate-800 dark:bg-navy-800 dark:text-navy-100',
      }
    };

    const grid = new Gridjs.Grid(gridConfig).render(gridContainer);

    // Export Columns definition
    const columns = [
      { id: 'name', name: 'Scheme Name' },
      { id: 'scheme_code', name: 'Code' },
      { id: 'rta_code', name: 'RTA Code' },
      { id: 'isin', name: 'ISIN' },
      { id: 'category', name: 'Category' },
      { id: 'min_purchase', name: 'Min Purchase' },
    ];

    // Popper setup
    const config = {
      placement: "bottom-start",
      modifiers: [
        {
          name: "offset",
          options: {
            offset: [0, 4],
          },
        },
      ],
    };
    new Popper("#dropdown-wrapper6", ".popper-ref", ".popper-root", config);

    // Tom Select setup
    const statusFilter = document.querySelector("#status-filter");
    const tomConfig = {
      create: false,
      sortField: { field: "text", direction: "asc" },
    };
    var filterSelect = new Tom(statusFilter, tomConfig);

    // Filter Logic
    filterSelect.on('change', () => {
      const selectedCategory = statusFilter.value;
      let filteredData = tableData;
      if (selectedCategory) {
        filteredData = tableData.filter(item => item.category === selectedCategory);
      }
      grid.updateConfig({ data: filteredData }).forceRender();
    });

    // Search Logic
    const filterInput = document.getElementById('filter-input');
    filterInput.addEventListener('input', (e) => {
      const keyword = e.target.value.toLowerCase();
      if (!keyword) {
          grid.updateConfig({ data: tableData }).forceRender();
          return;
      }
      const filteredData = tableData.filter(item =>
          item.name.toLowerCase().includes(keyword) ||
          item.scheme_code.toLowerCase().includes(keyword) ||
          item.isin.toLowerCase().includes(keyword)
      );
      grid.updateConfig({ data: filteredData }).forceRender();
    });

    // Exports
    document.getElementById('btn-export-csv').addEventListener('click', () => {
      GridJSExportUtils.exportCsv(tableData, columns, { filename: 'scheme_list' });
    });
    document.getElementById('btn-export-excel').addEventListener('click', () => {
      GridJSExportUtils.exportExcel(tableData, columns, { filename: 'scheme_list', sheetName: 'Schemes' });
    });
    document.getElementById('btn-export-pdf').addEventListener('click', () => {
      GridJSExportUtils.exportPdf(tableData, columns, { filename: 'scheme_list', title: 'Schemes' });
    });
    document.getElementById('btn-copy-clipboard').addEventListener('click', () => {
      GridJSExportUtils.copyToClipboard(tableData, columns);
    });
  });
</script>
{% endblock %}
