{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Meta tags  -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />

    <title>Sign In - Mutual Fund Portal</title>
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}" />

    <!-- CSS Assets -->
    <link rel="stylesheet" href="{% static 'css/app.css' %}" />

    <!-- Javascript Assets -->
    <script src="{% static 'js/app.js' %}" defer></script>
    <script src="{% static 'js/pages/pages-sign-in-2.js' %}" defer></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap"
      rel="stylesheet"
    />
    <script>
      /**
       * THIS SCRIPT REQUIRED FOR PREVENT FLICKERING IN SOME BROWSERS
       */
      localStorage.getItem("dark-mode") === "dark" &&
        document.documentElement.classList.add("dark");
    </script>
  </head>

  <body class="is-header-blur is-sidebar-open">
    <!-- App preloader-->
    <div
      class="app-preloader fixed z-50 grid h-full w-full place-content-center bg-slate-50 dark:bg-navy-900"
    >
      <div class="app-preloader-inner relative inline-block size-48"></div>
    </div>

    <!-- Page Wrapper -->
    <div
      id="root"
      class="min-h-100vh cloak flex grow bg-slate-50 dark:bg-navy-900"
    >
      <div class="fixed top-0 hidden p-6 lg:block lg:px-12">
        <a href="#" class="flex items-center space-x-2">
          <img  src="{% static 'images/logo12.png' %}" alt="logo" />
          <p
            class="text-xl font-semibold uppercase text-slate-700 dark:text-navy-100"
          >
           
          </p>
        </a>
      </div>
      <div class="hidden w-full place-items-center lg:grid">
        <div class="w-full max-w-lg p-6">
           <img
            class="w-full"
            id="hero-image-light"
            src="{% static 'images/illustrations/dashboard-check.svg' %}"
            alt="image"
          /> 
          <img
            class="w-full"
            id="hero-image-dark"
            src="{% static 'images/illustrations/dashboard-check-dark.svg' %}"
            alt="image"
          />
        </div>
      </div>
      <main
        class="flex w-full flex-col items-center bg-white dark:bg-navy-700 lg:max-w-md">
        <div class="flex w-full max-w-sm grow flex-col justify-center p-5">
          <div class="text-center">
            <img
              class="mx-auto  "
              src="{% static 'images/logo12.png' %}"
              alt="logo"/>
            <div class="mt-4">
              <h2
                class="text-2xl font-semibold text-slate-600 dark:text-navy-100">
                Welcome Back
              </h2>
              <p class="text-slate-400 dark:text-navy-300">
                Please sign in to continue
              </p>
            </div>
          </div>
          <div class="mt-16">
            <div id="password-login-container">
            <form method="post" action="{% url 'users:login' %}">
                {% csrf_token %}
                {% if form.non_field_errors %}
                <div class="mb-4 text-center text-error text-red-500">
                    {% for error in form.non_field_errors %}
                        <p>{{ error }}</p>
                    {% endfor %}
                </div>
                {% endif %}

                <label class="relative flex">
                <input
                    class="form-input peer w-full rounded-lg bg-slate-150 px-3 py-2 pl-9 ring-primary/50 placeholder:text-slate-400 hover:bg-slate-200 focus:ring-3 dark:bg-navy-900/90 dark:ring-accent/50 dark:placeholder:text-navy-300 dark:hover:bg-navy-900 dark:focus:bg-navy-900"
                    placeholder="Username"
                    type="text"
                    name="username"
                    required
                />
                <span
                    class="pointer-events-none absolute flex h-full w-10 items-center justify-center text-slate-400 peer-focus:text-primary dark:text-navy-300 dark:peer-focus:text-accent"
                >
                    <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="size-5 transition-colors duration-200"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    >
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="1.5"
                        d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
                    />
                    </svg>
                </span>
                </label>
                <label class="relative mt-4 flex">
                <input
                    class="form-input peer w-full rounded-lg bg-slate-150 px-3 py-2 pl-9 ring-primary/50 placeholder:text-slate-400 hover:bg-slate-200 focus:ring-3 dark:bg-navy-900/90 dark:ring-accent/50 dark:placeholder:text-navy-300 dark:hover:bg-navy-900 dark:focus:bg-navy-900"
                    placeholder="Password"
                    type="password"
                    name="password"
                    required
                />
                <span
                    class="pointer-events-none absolute flex h-full w-10 items-center justify-center text-slate-400 peer-focus:text-primary dark:text-navy-300 dark:peer-focus:text-accent"
                >
                    <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="size-5 transition-colors duration-200"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    >
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="1.5"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
                    />
                    </svg>
                </span>
                </label>

                <div class="mt-4 flex items-center justify-between space-x-2">
                    <label class="inline-flex items-center space-x-2">
                      <input
                        class="form-checkbox is-outline size-5 rounded-sm border-slate-400/70 bg-slate-100 before:bg-primary checked:border-primary hover:border-primary focus:border-primary dark:border-navy-500 dark:bg-navy-900 dark:before:bg-accent dark:checked:border-accent dark:hover:border-accent dark:focus:border-accent"
                        type="checkbox"
                      />
                      <span class="line-clamp-1">Remember me</span>
                    </label>
                    <a
                      href="#"
                      class="text-xs text-slate-400 transition-colors line-clamp-1 hover:text-slate-800 focus:text-slate-800 dark:text-navy-300 dark:hover:text-navy-100 dark:focus:text-navy-100"
                      >Forgot Password?</a
                    >
                  </div>

                <button
                type="submit"
                class="btn mt-10 h-10 w-full bg-primary font-medium text-white hover:bg-primary-focus focus:bg-primary-focus active:bg-primary-focus/90 dark:bg-accent dark:hover:bg-accent-focus dark:focus:bg-accent-focus dark:active:bg-accent/90"
                >
                Sign In
                </button>
                <div class="mt-4 text-center">
                    <a href="#" id="toggle-otp-login" class="text-sm text-primary hover:underline">Login with OTP</a>
                </div>
            </form>
            </div>

            <!-- OTP Login Container -->
            <div id="otp-login-container" style="display: none;">
                <div id="otp-step-1">
                    <div class="mb-4 text-center text-error text-red-500 hidden" id="otp-error-1"></div>
                    <label class="relative flex">
                        <input
                            class="form-input peer w-full rounded-lg bg-slate-150 px-3 py-2 pl-9 ring-primary/50 placeholder:text-slate-400 hover:bg-slate-200 focus:ring-3 dark:bg-navy-900/90 dark:ring-accent/50 dark:placeholder:text-navy-300 dark:hover:bg-navy-900 dark:focus:bg-navy-900"
                            placeholder="Username (PAN)"
                            type="text"
                            id="otp-username"
                        />
                        <span class="pointer-events-none absolute flex h-full w-10 items-center justify-center text-slate-400 peer-focus:text-primary dark:text-navy-300 dark:peer-focus:text-accent">
                            <svg xmlns="http://www.w3.org/2000/svg" class="size-5 transition-colors duration-200" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                            </svg>
                        </span>
                    </label>
                    <button id="send-otp-btn" class="btn mt-10 h-10 w-full bg-primary font-medium text-white hover:bg-primary-focus focus:bg-primary-focus active:bg-primary-focus/90 dark:bg-accent dark:hover:bg-accent-focus dark:focus:bg-accent-focus dark:active:bg-accent/90">
                        Send OTP
                    </button>
                </div>

                <div id="otp-step-2" style="display: none;">
                    <div class="mb-4 text-center text-success text-green-500" id="otp-sent-msg"></div>
                    <div class="mb-4 text-center text-error text-red-500 hidden" id="otp-error-2"></div>
                    <label class="relative flex">
                        <input
                            class="form-input peer w-full rounded-lg bg-slate-150 px-3 py-2 pl-9 ring-primary/50 placeholder:text-slate-400 hover:bg-slate-200 focus:ring-3 dark:bg-navy-900/90 dark:ring-accent/50 dark:placeholder:text-navy-300 dark:hover:bg-navy-900 dark:focus:bg-navy-900"
                            placeholder="Enter OTP"
                            type="text"
                            id="otp-input"
                        />
                        <span class="pointer-events-none absolute flex h-full w-10 items-center justify-center text-slate-400 peer-focus:text-primary dark:text-navy-300 dark:peer-focus:text-accent">
                             <svg xmlns="http://www.w3.org/2000/svg" class="size-5 transition-colors duration-200" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </span>
                    </label>
                    <button id="verify-otp-btn" class="btn mt-10 h-10 w-full bg-primary font-medium text-white hover:bg-primary-focus focus:bg-primary-focus active:bg-primary-focus/90 dark:bg-accent dark:hover:bg-accent-focus dark:focus:bg-accent-focus dark:active:bg-accent/90">
                        Login
                    </button>
                     <div class="mt-4 text-center">
                        <button id="resend-otp-btn" class="text-xs text-slate-400 hover:text-primary">Resend OTP</button>
                    </div>
                </div>

                <div class="mt-4 text-center">
                    <a href="#" id="toggle-password-login" class="text-sm text-primary hover:underline">Back to Password Login</a>
                </div>
            </div>

          </div>
        </div>
      </main>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const passwordContainer = document.getElementById('password-login-container');
            const otpContainer = document.getElementById('otp-login-container');
            const toggleOtpBtn = document.getElementById('toggle-otp-login');
            const togglePasswordBtn = document.getElementById('toggle-password-login');

            const otpStep1 = document.getElementById('otp-step-1');
            const otpStep2 = document.getElementById('otp-step-2');

            const sendOtpBtn = document.getElementById('send-otp-btn');
            const verifyOtpBtn = document.getElementById('verify-otp-btn');
            const resendOtpBtn = document.getElementById('resend-otp-btn');

            const otpUsernameInput = document.getElementById('otp-username');
            const otpInput = document.getElementById('otp-input');

            const otpError1 = document.getElementById('otp-error-1');
            const otpError2 = document.getElementById('otp-error-2');
            const otpSentMsg = document.getElementById('otp-sent-msg');

            // Toggle Views
            toggleOtpBtn.addEventListener('click', function(e) {
                e.preventDefault();
                passwordContainer.style.display = 'none';
                otpContainer.style.display = 'block';
                otpStep1.style.display = 'block';
                otpStep2.style.display = 'none';
                otpError1.classList.add('hidden');
            });

            togglePasswordBtn.addEventListener('click', function(e) {
                e.preventDefault();
                otpContainer.style.display = 'none';
                passwordContainer.style.display = 'block';
            });

            // Helper to get CSRF token
            function getCookie(name) {
                let cookieValue = null;
                if (document.cookie && document.cookie !== '') {
                    const cookies = document.cookie.split(';');
                    for (let i = 0; i < cookies.length; i++) {
                        const cookie = cookies[i].trim();
                        if (cookie.substring(0, name.length + 1) === (name + '=')) {
                            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                            break;
                        }
                    }
                }
                return cookieValue;
            }
            const csrftoken = getCookie('csrftoken');

            // Send OTP
            function sendOtp() {
                const username = otpUsernameInput.value.trim();
                if (!username) {
                    otpError1.textContent = 'Please enter your username (PAN).';
                    otpError1.classList.remove('hidden');
                    return;
                }

                otpError1.classList.add('hidden');
                sendOtpBtn.disabled = true;
                sendOtpBtn.textContent = 'Sending...';

                fetch("{% url 'users:send_otp' %}", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'X-CSRFToken': csrftoken
                    },
                    body: `username=${encodeURIComponent(username)}`
                })
                .then(response => response.json())
                .then(data => {
                    sendOtpBtn.disabled = false;
                    sendOtpBtn.textContent = 'Send OTP';

                    if (data.status === 'success') {
                        otpStep1.style.display = 'none';
                        otpStep2.style.display = 'block';
                        otpSentMsg.textContent = data.message;
                        otpError2.classList.add('hidden');
                    } else {
                        otpError1.textContent = data.message || 'Error sending OTP.';
                        otpError1.classList.remove('hidden');
                    }
                })
                .catch(error => {
                    sendOtpBtn.disabled = false;
                    sendOtpBtn.textContent = 'Send OTP';
                    otpError1.textContent = 'Network error. Please try again.';
                    otpError1.classList.remove('hidden');
                });
            }

            sendOtpBtn.addEventListener('click', function(e) {
                e.preventDefault();
                sendOtp();
            });

            resendOtpBtn.addEventListener('click', function(e) {
                e.preventDefault();
                sendOtp();
            });

            // Verify OTP
            verifyOtpBtn.addEventListener('click', function(e) {
                e.preventDefault();
                const username = otpUsernameInput.value.trim();
                const otp = otpInput.value.trim();

                if (!otp) {
                    otpError2.textContent = 'Please enter the OTP.';
                    otpError2.classList.remove('hidden');
                    return;
                }

                otpError2.classList.add('hidden');
                verifyOtpBtn.disabled = true;
                verifyOtpBtn.textContent = 'Verifying...';

                fetch("{% url 'users:verify_otp_login' %}", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'X-CSRFToken': csrftoken
                    },
                    body: `username=${encodeURIComponent(username)}&otp=${encodeURIComponent(otp)}`
                })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        window.location.href = data.redirect_url;
                    } else {
                        verifyOtpBtn.disabled = false;
                        verifyOtpBtn.textContent = 'Login';
                        otpError2.textContent = data.message || 'Invalid OTP.';
                        otpError2.classList.remove('hidden');
                    }
                })
                .catch(error => {
                    verifyOtpBtn.disabled = false;
                    verifyOtpBtn.textContent = 'Login';
                    otpError2.textContent = 'Network error. Please try again.';
                    otpError2.classList.remove('hidden');
                });
            });
        });
    </script>
  </body>
</html>
