{% extends 'layout/base.html' %}
{% load static %}

{% block content %}
<div class="my-5 flex h-8 items-center justify-between px-4 sm:px-5">
    <div class="flex items-center space-x-4">
        <h2 class="text-xl font-medium text-slate-800 dark:text-navy-50 lg:text-2xl">
            Order Book
        </h2>
        <div class="hidden h-full py-1 sm:flex">
            <div class="h-full w-px bg-slate-300 dark:bg-navy-600"></div>
        </div>
        <ul class="hidden flex-wrap items-center space-x-2 sm:flex">
            <li class="flex items-center space-x-2">
                <a class="text-primary transition-colors hover:text-primary-focus dark:text-accent-light dark:hover:text-accent" href="#">Investments</a>
                <svg xmlns="http://www.w3.org/2000/svg" class="size-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                </svg>
            </li>
            <li>Order Book</li>
        </ul>
    </div>
    <div class="flex items-center space-x-2">
        <a href="{% url 'order_create' %}" class="btn bg-primary font-medium text-white hover:bg-primary-focus focus:bg-primary-focus active:bg-primary-focus/90 dark:bg-accent dark:hover:bg-accent-focus dark:focus:bg-accent-focus dark:active:bg-accent/90">
            New Purchase
        </a>
    </div>
</div>

<div class="card p-4">
    <div class="flex flex-col sm:flex-row sm:items-end justify-between mb-4 space-y-4 sm:space-y-0">
        <div class="w-full sm:w-auto">
             <input id="filter-input" type="search" placeholder="Search Orders..." class="form-input w-full rounded-lg border border-slate-300 bg-transparent px-3 py-2 placeholder:text-slate-400/70 hover:border-slate-400 focus:border-primary dark:border-navy-450 dark:hover:border-navy-400 dark:focus:border-accent" />
        </div>

        <div class="flex flex-col sm:flex-row items-center space-y-4 sm:space-y-0 sm:space-x-4 w-full sm:w-auto justify-end">
            <!-- Export Dropdown -->
            <div id="dropdown-wrapper-export" class="inline-flex relative">
                <button class="popper-ref btn space-x-2 bg-slate-150 font-medium text-slate-800 hover:bg-slate-200 focus:bg-slate-200 active:bg-slate-200/80 dark:bg-navy-500 dark:text-navy-50 dark:hover:bg-navy-450 dark:focus:bg-navy-450 dark:active:bg-navy-450/90 [&.is-active_svg]:rotate-180">
                    <span>Export</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="size-4 transition-transform duration-200" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                    </svg>
                </button>
                <div class="popper-root absolute">
                    <div class="popper-box rounded-md border border-slate-150 bg-white py-1.5 font-inter dark:border-navy-500 dark:bg-navy-700">
                        <ul>
                            <li>
                                <a href="#" id="btn-export-csv" class="flex h-8 items-center space-x-3 px-3 pr-8 font-medium tracking-wide outline-hidden transition-all hover:bg-slate-100 hover:text-slate-800 focus:bg-slate-100 focus:text-slate-800 dark:hover:bg-navy-600 dark:hover:text-navy-100 dark:focus:bg-navy-600 dark:focus:text-navy-100">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="mt-px size-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                    </svg>
                                    <span> CSV</span>
                                </a>
                            </li>
                            <li>
                                <a href="#" id="btn-export-excel" class="flex h-8 items-center space-x-3 px-3 pr-8 font-medium tracking-wide outline-hidden transition-all hover:bg-slate-100 hover:text-slate-800 focus:bg-slate-100 focus:text-slate-800 dark:hover:bg-navy-600 dark:hover:text-navy-100 dark:focus:bg-navy-600 dark:focus:text-navy-100">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="size-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                                    </svg>
                                    <span> Excel</span>
                                </a>
                            </li>
                            <li>
                                <a href="#" id="btn-export-pdf" class="flex h-8 items-center space-x-3 px-3 pr-8 font-medium tracking-wide outline-hidden transition-all hover:bg-slate-100 hover:text-slate-800 focus:bg-slate-100 focus:text-slate-800 dark:hover:bg-navy-600 dark:hover:text-navy-100 dark:focus:bg-navy-600 dark:focus:text-navy-100">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="size-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                                    </svg>
                                    <span> PDF</span>
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>

            <!-- Status Filter -->
            <div class="w-full sm:w-48">
                <select id="status-filter" class="w-full">
                    <option value="">All Statuses</option>
                    <option value="Pending">Pending</option>
                    <option value="Sent to BSE">Sent to BSE</option>
                    <option value="Allotted">Allotted</option>
                    <option value="Rejected">Rejected</option>
                </select>
            </div>
        </div>
    </div>

    <div id="order-grid"></div>
</div>
{% endblock %}

{% block javascript %}
{% include 'includes/gridjs_export_scripts.html' %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const gridData = {{ grid_data_json|safe }};
        const gridContainer = document.getElementById("order-grid");

        // Helper to format currency
        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR' }).format(amount);
        };

        const gridConfig = {
            columns: [
                { id: 'created_at', name: 'Date' },
                { id: 'unique_ref_no', name: 'Order Ref' },
                { id: 'investor_name', name: 'Investor' },
                { id: 'scheme_name', name: 'Scheme', width: '25%' },
                { id: 'transaction_type', name: 'Type' },
                {
                    id: 'amount',
                    name: 'Amount',
                    formatter: (cell) => formatCurrency(cell)
                },
                {
                    id: 'status',
                    name: 'Status',
                    formatter: (cell) => {
                        let badgeClass = 'bg-slate-150 text-slate-800 dark:bg-navy-500 dark:text-navy-100'; // Default

                        if (cell === 'Approved' || cell === 'Allotted' || cell === 'Sent to BSE') {
                            badgeClass = 'bg-success/10 text-success dark:bg-success/15';
                        } else if (cell === 'Rejected') {
                            badgeClass = 'bg-error/10 text-error dark:bg-error/15';
                        } else if (cell === 'Pending') {
                            badgeClass = 'bg-warning/10 text-warning dark:bg-warning/15';
                        }

                        return Gridjs.html(`<div class="badge space-x-2.5 rounded-full ${badgeClass}">
                            <div class="h-2 w-2 rounded-full bg-current"></div>
                            <span>${cell}</span>
                        </div>`);
                    }
                },
                { id: 'bse_order_id', name: 'BSE Ref' }
            ],
            data: gridData,
            search: false, // Using custom search
            sort: true,
            pagination: {
                limit: 10
            },
            className: {
                table: 'is-hoverable w-full text-left',
                tbody: 'text-slate-600 dark:text-navy-200',
                thead: 'bg-slate-200 text-slate-800 dark:bg-navy-800 dark:text-navy-100',
            }
        };

        const grid = new Gridjs.Grid(gridConfig).render(gridContainer);

        // --- Export Configuration ---
        const exportColumns = [
            { id: 'created_at', name: 'Date' },
            { id: 'unique_ref_no', name: 'Order Ref' },
            { id: 'investor_name', name: 'Investor' },
            { id: 'scheme_name', name: 'Scheme' },
            { id: 'transaction_type', name: 'Type' },
            { id: 'amount', name: 'Amount' },
            { id: 'status', name: 'Status' },
            { id: 'bse_order_id', name: 'BSE Ref' }
        ];

        // --- Popper (Dropdown) Setup ---
        const popperConfig = {
            placement: "bottom-end",
            modifiers: [
                {
                    name: "offset",
                    options: { offset: [0, 4] },
                },
            ],
        };
        new Popper("#dropdown-wrapper-export", ".popper-ref", ".popper-root", popperConfig);

        // --- Tom Select (Status Filter) Setup ---
        const statusFilter = document.querySelector("#status-filter");
        if (window.Tom) {
             new Tom(statusFilter, {
                create: false,
                sortField: { field: "text", direction: "asc" },
                onItemAdd: function() {
                    this.setTextboxValue('');
                    this.refreshOptions();
                },
            });
        }

        // --- Filtering Logic ---
        const applyFilters = () => {
            const keyword = document.getElementById('filter-input').value.toLowerCase();
            const status = statusFilter.value;

            let filtered = gridData.filter(row => {
                // Search Filter
                const matchesSearch =
                    (row.unique_ref_no && row.unique_ref_no.toLowerCase().includes(keyword)) ||
                    (row.investor_name && row.investor_name.toLowerCase().includes(keyword)) ||
                    (row.scheme_name && row.scheme_name.toLowerCase().includes(keyword)) ||
                    (row.bse_order_id && row.bse_order_id.toLowerCase().includes(keyword));

                // Status Filter
                const matchesStatus = status === "" || row.status === status;

                return matchesSearch && matchesStatus;
            });

            grid.updateConfig({ data: filtered }).forceRender();
        };

        // Event Listeners
        document.getElementById('filter-input').addEventListener('input', applyFilters);
        statusFilter.addEventListener('change', applyFilters);

        // --- Export Event Listeners ---
        document.getElementById('btn-export-csv').addEventListener('click', (e) => {
            e.preventDefault();
            GridJSExportUtils.exportCsv(grid.config.data, exportColumns, { filename: 'order_book' });
        });
        document.getElementById('btn-export-excel').addEventListener('click', (e) => {
             e.preventDefault();
             GridJSExportUtils.exportExcel(grid.config.data, exportColumns, { filename: 'order_book', sheetName: 'Orders' });
        });
        document.getElementById('btn-export-pdf').addEventListener('click', (e) => {
             e.preventDefault();
             GridJSExportUtils.exportPdf(grid.config.data, exportColumns, { filename: 'order_book', title: 'Order Book' });
        });
    });
</script>
{% endblock %}
