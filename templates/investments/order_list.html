{% extends 'layout/base.html' %}
{% load static %}

{% block content %}
<div class="flex flex-col items-center justify-between space-y-4 py-5 sm:flex-row sm:space-y-0 lg:py-6">
    <div class="flex items-center space-x-1">
        <h2 class="text-xl font-medium text-slate-700 line-clamp-1 dark:text-navy-50">
            Order Book
        </h2>
    </div>
    <div class="flex justify-center space-x-2">
        <a href="{% url 'order_create' %}" class="btn min-w-[7rem] bg-primary font-medium text-white hover:bg-primary-focus focus:bg-primary-focus active:bg-primary-focus/90 dark:bg-accent dark:hover:bg-accent-focus dark:focus:bg-accent-focus dark:active:bg-accent/90">
             New Purchase
        </a>
    </div>
</div>

<div class="card p-4 sm:p-5">
    <div class="flex items-center justify-between pb-4">
        <h3 class="text-base font-medium text-slate-700 dark:text-navy-100">Recent Orders</h3>
        <div class="flex space-x-2">
            <button id="btn-export-csv" class="btn h-8 rounded-full border border-slate-300 px-3 text-xs+ font-medium text-slate-700 hover:bg-slate-150 focus:bg-slate-150 active:bg-slate-150/80 dark:border-navy-450 dark:text-navy-100 dark:hover:bg-navy-500 dark:focus:bg-navy-500 dark:active:bg-navy-500/90">
                CSV
            </button>
            <button id="btn-export-excel" class="btn h-8 rounded-full border border-slate-300 px-3 text-xs+ font-medium text-slate-700 hover:bg-slate-150 focus:bg-slate-150 active:bg-slate-150/80 dark:border-navy-450 dark:text-navy-100 dark:hover:bg-navy-500 dark:focus:bg-navy-500 dark:active:bg-navy-500/90">
                Excel
            </button>
        </div>
    </div>
    <div id="order-grid"></div>
</div>
{% endblock %}

{% block javascript %}
<script src="{% static 'js/utils/gridjs-export-utils.js' %}"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Parse the JSON data passed from the view
        const gridData = JSON.parse('{{ grid_data_json|escapejs }}');

        // Check if Gridjs is available (bundled in app.js)
        if (typeof Gridjs === 'undefined') {
            console.error("Gridjs library not loaded!");
            // Fallback warning
            document.getElementById("order-grid").innerHTML = "<div class='text-error'>Error: Grid.js library not loaded. Please check console.</div>";
            return;
        }

        // Handle both Bundle (window.Gridjs = module) and Direct (window.Gridjs = class) cases
        const GridConstructor = Gridjs.Grid ? Gridjs.Grid : Gridjs;
        const html = Gridjs.html ? Gridjs.html : (Gridjs.Grid ? Gridjs.html : null);

        // If html helper is missing from the object, we might have an issue with the formatter
        // But let's assume if it's the class, maybe we can't use .html() easily or it's static?
        // Actually, if window.Gridjs is the class, usually window.Gridjs.html isn't there unless attached.

        // Let's try to find 'html' helper. If not found, use a basic text formatter or try to find it on the constructor?
        const safeHtml = html || ((content) => content);

        const grid = new GridConstructor({
            columns: [
                { id: 'created_at', name: 'Date' },
                { id: 'unique_ref_no', name: 'Order Ref' },
                { id: 'investor_name', name: 'Investor' },
                { id: 'scheme_name', name: 'Scheme', width: '25%' },
                { id: 'transaction_type', name: 'Type' },
                {
                    id: 'amount',
                    name: 'Amount',
                    formatter: (cell) => `₹${parseFloat(cell).toLocaleString('en-IN')}`
                },
                {
                    id: 'status',
                    name: 'Status',
                    formatter: (cell) => {
                         let color = 'text-slate-500';
                         if (cell === 'Approved' || cell === 'Allotted' || cell === 'Sent to BSE') color = 'text-success';
                         if (cell === 'Rejected') color = 'text-error';
                         if (cell === 'Pending') color = 'text-warning';
                         return safeHtml(`<span class="font-medium ${color}">${cell}</span>`);
                    }
                },
                { id: 'bse_order_id', name: 'BSE Ref' }
            ],
            data: gridData,
            search: true,
            sort: true,
            pagination: {
                limit: 10
            },
            className: {
                table: 'table is-hoverable w-full text-left',
                tbody: 'text-slate-600 dark:text-navy-100',
                thead: 'bg-slate-200 text-slate-800 dark:bg-navy-800 dark:text-navy-100 uppercase font-semibold text-xs',
                td: 'border-t border-slate-200 dark:border-navy-500 px-4 py-3',
                th: 'px-4 py-3 whitespace-nowrap lg:px-5'
            }
        }).render(document.getElementById("order-grid"));

        // Export Functionality
        document.getElementById('btn-export-csv').addEventListener('click', () => {
             const headers = ['Date', 'Ref', 'Investor', 'Scheme', 'Type', 'Amount', 'Status', 'BSE Ref'];
             const rows = gridData.map(row => [
                 row.created_at, row.unique_ref_no, row.investor_name, row.scheme_name,
                 row.transaction_type, row.amount, row.status, row.bse_order_id
             ]);

             let csvContent = "data:text/csv;charset=utf-8,"
                + headers.join(",") + "\n"
                + rows.map(e => e.join(",")).join("\n");

             const encodedUri = encodeURI(csvContent);
             const link = document.createElement("a");
             link.setAttribute("href", encodedUri);
             link.setAttribute("download", "orders.csv");
             document.body.appendChild(link);
             link.click();
             document.body.removeChild(link);
        });

        document.getElementById('btn-export-excel').addEventListener('click', () => {
             alert("Excel export functionality to be implemented.");
        });
    });
</script>
{% endblock %}
