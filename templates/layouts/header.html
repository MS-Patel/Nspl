{% load static %}
<nav class="header print:hidden">
    <!-- App Header  -->
    <div
      class="header-container relative flex w-full bg-white dark:bg-navy-700 print:hidden sm:flex-col"
    >
      <!-- Header Items -->
      <div class="flex w-full items-center justify-between sm:h-16">
        <div class="hidden items-center space-x-2 sm:flex">
          <a href="/">
            <!-- Logo placeholder -->
            <div class="size-10 bg-primary rounded-full flex items-center justify-center text-white font-bold">MF</div>
          </a>
          <span
            class="text-xl font-semibold uppercase text-slate-700 dark:text-navy-100"
          >
            MF Portal
          </span>
        </div>

        <!-- Right: Header buttons -->
        <div class="-mr-1.5 flex items-center space-x-2">

          <!-- Profile -->
          <div id="profile-wrapper" class="flex">
            <button id="profile-ref" class="avatar cursor-pointer size-12">
              <div class="rounded-full bg-slate-200 flex items-center justify-center text-slate-600 font-bold">
                  {{ user.username|slice:":2"|upper }}
              </div>
              <span
                class="absolute right-0 size-3.5 rounded-full border-2 border-white bg-success dark:border-navy-700"
              ></span>
            </button>
            <div id="profile-box" class="popper-root fixed">
              <div
                class="popper-box w-64 rounded-lg border border-slate-150 bg-white shadow-soft dark:border-navy-600 dark:bg-navy-700"
              >
                <div
                  class="flex items-center space-x-4 rounded-t-lg bg-slate-100 py-5 px-4 dark:bg-navy-800"
                >
                  <div class="avatar size-14">
                    <div class="rounded-full bg-slate-200 flex items-center justify-center text-slate-600 font-bold text-xl">
                        {{ user.username|slice:":2"|upper }}
                    </div>
                  </div>
                  <div>
                    <a
                      href="#"
                      class="text-base font-medium text-slate-700 hover:text-primary focus:text-primary dark:text-navy-100 dark:hover:text-accent-light dark:focus:text-accent-light"
                    >
                      {{ user.username }}
                    </a>
                    <p class="text-xs text-slate-400 dark:text-navy-300">
                      {{ user.get_user_type_display }}
                    </p>
                  </div>
                </div>
                <div class="flex flex-col pt-2 pb-5">
                  <div class="mt-3 px-4">
                    <form action="{% url 'logout' %}" method="post">
                        {% csrf_token %}
                        <button
                          type="submit"
                          class="btn h-9 w-full space-x-2 bg-primary text-white hover:bg-primary-focus focus:bg-primary-focus active:bg-primary-focus/90 dark:bg-accent dark:hover:bg-accent-focus dark:focus:bg-accent-focus dark:active:bg-accent/90"
                        >
                          <svg
                            xmlns="http://www.w3.org/2000/svg"
                            class="size-5"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke="currentColor"
                          >
                            <path
                              stroke-linecap="round"
                              stroke-linejoin="round"
                              stroke-width="1.5"
                              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
                            />
                          </svg>
                          <span>Logout</span>
                        </button>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Header Navigation -->
      <!-- We can add navigation links here based on user role later -->
    </div>
</nav>
