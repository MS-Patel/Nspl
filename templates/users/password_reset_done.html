{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
    <title>Email Sent - Mutual Fund Portal</title>
    <!-- CSS Assets -->
    <link rel="stylesheet" href="{% static 'css/app.css' %}" />
    <script src="{% static 'js/app.js' %}" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet" />
    <script>
      localStorage.getItem("dark-mode") === "dark" && document.documentElement.classList.add("dark");
    </script>
  </head>
  <body class="is-header-blur is-sidebar-open">
    <div class="app-preloader fixed z-50 grid h-full w-full place-content-center bg-slate-50 dark:bg-navy-900">
      <div class="app-preloader-inner relative inline-block size-48"></div>
    </div>
    <div id="root" class="min-h-100vh cloak flex grow bg-slate-50 dark:bg-navy-900">
       <main class="flex w-full flex-col items-center bg-white dark:bg-navy-700 lg:max-w-md mx-auto justify-center">
        <div class="flex w-full max-w-sm grow flex-col justify-center p-5">
            <div class="text-center">
                <img class="mx-auto" src="{% static 'images/logo12.png' %}" alt="logo"/>
                <div class="mt-4">
                    <h2 class="text-2xl font-semibold text-slate-600 dark:text-navy-100">Email Sent</h2>
                    <p class="text-slate-400 dark:text-navy-300 mt-4">
                        We have sent you an email with a link to reset your password. Please check your inbox.
                    </p>
                    <div class="mt-8">
                        <a href="{% url 'users:login' %}" class="btn bg-primary text-white font-medium hover:bg-primary-focus focus:bg-primary-focus active:bg-primary-focus/90 dark:bg-accent dark:hover:bg-accent-focus dark:focus:bg-accent-focus dark:active:bg-accent/90">Back to Login</a>
                    </div>
                </div>
            </div>
        </div>
      </main>
    </div>
  </body>
</html>
