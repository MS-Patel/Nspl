{% extends 'layout/base.html' %}
{% block content %}
<div class="flex h-[calc(100vh-5rem)] items-center justify-center p-4">
    <div class="card w-full max-w-lg p-4 sm:p-5">
        <div class="flex flex-col items-center">
             <div class="avatar size-20">
                <div class="is-initial rounded-full bg-error/10 text-error">
                    <svg xmlns="http://www.w3.org/2000/svg" class="size-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                </div>
            </div>
            <h2 class="mt-4 text-xl font-medium text-slate-700 dark:text-navy-100">
                Delete Branch?
            </h2>
            <p class="mt-2 text-center text-slate-500 dark:text-navy-200">
                Are you sure you want to delete branch <strong>{{ object.name }}</strong>? <br/> This action cannot be undone.
            </p>
            <form method="post" class="mt-6 flex w-full space-x-4">
                {% csrf_token %}
                <a href="{% url 'users:branch_list' %}" class="btn w-full border border-slate-300 font-medium text-slate-800 hover:bg-slate-150 focus:bg-slate-150 active:bg-slate-150/80 dark:border-navy-450 dark:text-navy-50 dark:hover:bg-navy-500 dark:focus:bg-navy-500 dark:active:bg-navy-500/90">
                    Cancel
                </a>
                <button type="submit" class="btn w-full bg-error font-medium text-white hover:bg-error-focus focus:bg-error-focus active:bg-error-focus/90">
                    Delete
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
