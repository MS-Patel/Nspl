{% extends 'layout/base.html' %}

{% block content %}
<div class="flex items-center justify-between py-5 lg:py-6">
    <h2 class="text-xl font-medium text-slate-800 dark:text-navy-50 lg:text-2xl">
      Investors
    </h2>
    {% if user.user_type == 'DISTRIBUTOR' %}
    <a href="{% url 'investor_create' %}" class="btn bg-primary font-medium text-white hover:bg-primary-focus focus:bg-primary-focus active:bg-primary-focus/90 dark:bg-accent dark:hover:bg-accent-focus dark:focus:bg-accent-focus dark:active:bg-accent/90">
        Onboard Investor
    </a>
    {% endif %}
</div>

<div class="card p-4">
    <div id="investor-table"></div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="https://unpkg.com/gridjs/dist/gridjs.umd.js"></script>
<link href="https://unpkg.com/gridjs/dist/theme/mermaid.min.css" rel="stylesheet" />
<script>
    new gridjs.Grid({
        columns: ["Name", "PAN", "Mobile", "Distributor", "Actions"],
        data: [
            {% for inv in investors %}
            ["{{ inv.user.name|default:inv.user.username }}", "{{ inv.pan }}", "{{ inv.mobile }}",
             "{{ inv.distributor.user.username|default:'-' }}",
             gridjs.html(`<a href='#' class='text-primary'>View</a>`)],
            {% endfor %}
        ],
        search: true,
        pagination: {
            limit: 10
        },
        sort: true,
    }).render(document.getElementById("investor-table"));
</script>
{% endblock %}
