{% extends 'layout/base.html' %}
{% load static %}
{% block css %}
<!-- Add custom CSS here if needed -->
{% endblock %}
{% block content %}
<div class="my-5 flex h-8 items-center justify-between px-4 sm:px-5">
  <div class="flex items-center space-x-4">
        <h2
          class="text-xl font-medium text-slate-800 dark:text-navy-50 lg:text-2xl"
        >
         Branch Masters
        </h2>
        <div class="hidden h-full py-1 sm:flex">
          <div class="h-full w-px bg-slate-300 dark:bg-navy-600"></div>
        </div>
        <ul class="hidden flex-wrap items-center space-x-2 sm:flex">
          <li class="flex items-center space-x-2">
            <a
              class="text-primary transition-colors hover:text-primary-focus dark:text-accent-light dark:hover:text-accent"
              href="#"
              >Masters</a
            >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="size-4"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9 5l7 7-7 7"
              />
            </svg>
          </li>
          <li>Branches</li>
        </ul>
      </div>
  <div class="flex items-center space-x-2">
     <a href="{% url 'users:branch_create' %}" class="btn bg-primary font-medium text-white hover:bg-primary-focus focus:bg-primary-focus active:bg-primary-focus/90 dark:bg-accent dark:hover:bg-accent-focus dark:focus:bg-accent-focus dark:active:bg-accent/90">
      Add New Branch
    </a>
  </div>
</div>
<div class="card p-4">
  <div>
    <div class="flex flex-col sm:flex-row sm:items-end justify-between mb-4 space-y-4 sm:space-y-0">
      <div class="w-full sm:w-auto">
        <input id="filter-input" type="search" placeholder="Search Branches..." class="form-input w-full rounded-lg border border-slate-300 bg-transparent px-3 py-2 placeholder:text-slate-400/70 hover:border-slate-400 focus:border-primary dark:border-navy-450 dark:hover:border-navy-400 dark:focus:border-accent" />
      </div>
    </div>
    <div id="branch_list"></div>
  </div>
</div>
{% endblock %}

{% block javascript %}
<script type="module">
  import { Grid, html } from "https://unpkg.com/gridjs?module";
  document.addEventListener('DOMContentLoaded', () => {
    const tableData = {{ grid_data_json|safe }};
    const gridContainer = document.querySelector("#branch_list");

    const escapeHtml = (unsafe) => {
        if (!unsafe) return "";
        return String(unsafe)
             .replaceAll('&', '&amp;')
             .replaceAll('<', '&lt;')
             .replaceAll('>', '&gt;')
             .replaceAll('"', '&quot;')
             .replaceAll("'", '&#039;');
    }

    const grid = new Grid({
      columns: [
        { id: "id", hidden: true },
        {
          id: "name",
          name: "Branch Name",
          formatter: (cell) => html(`<span class="font-medium text-slate-700 dark:text-navy-100">${escapeHtml(cell)}</span>`)
        },
        { id: "code", name: "Branch Code" },
        { id: "city", name: "City" },
        { id: "state", name: "State" },
        {
            id: "action_url",
            name: "Actions",
            formatter: (cell, row) => {
                // row.cells is an array of objects { data: ... } in the same order as columns
                // Columns: id, name, code, city, state, action_url, delete_url
                // delete_url is at index 6
                const deleteUrl = row.cells[6].data;
                return html(`<div class="flex space-x-2">
                    <a href="${cell}" class="btn h-8 w-8 rounded-full p-0 hover:bg-slate-300/20 focus:bg-slate-300/20 active:bg-slate-300/25 dark:hover:bg-navy-300/20 dark:focus:bg-navy-300/20 dark:active:bg-navy-300/25">
                        <svg xmlns="http://www.w3.org/2000/svg" class="size-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                          <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                        </svg>
                    </a>
                    <a href="${deleteUrl}" class="btn h-8 w-8 rounded-full p-0 text-error hover:bg-error/20 focus:bg-error/20 active:bg-error/25">
                        <svg xmlns="http://www.w3.org/2000/svg" class="size-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                          <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </a>
                </div>`);
            }
        },
        { id: "delete_url", hidden: true }
      ],
      data: tableData,
      sort: true,
      search: false,
      pagination: {
        limit: 10
      },
      className: {
        table: 'is-hoverable w-full text-left',
        tbody: 'text-slate-600 dark:text-navy-200',
        thead: 'bg-slate-200 text-slate-800 dark:bg-navy-800 dark:text-navy-100',
      }
    }).render(gridContainer);

    // Search Logic
    const filterInput = document.getElementById('filter-input');
    filterInput.addEventListener('input', (e) => {
      const keyword = e.target.value.toLowerCase();
      if (!keyword) {
          grid.updateConfig({ data: tableData }).forceRender();
          return;
      }
      const filteredData = tableData.filter(item =>
          item.name.toLowerCase().includes(keyword) ||
          item.code.toLowerCase().includes(keyword) ||
          item.city.toLowerCase().includes(keyword)
      );
      grid.updateConfig({ data: filteredData }).forceRender();
    });
  });
</script>
{% endblock %}
