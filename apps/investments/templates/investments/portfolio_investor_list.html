{% extends 'layout/base.html' %}
{% load static %}

{% block content %}
<div class="my-5 flex flex-col sm:flex-row items-start sm:items-center justify-between px-4 sm:px-5 space-y-4 sm:space-y-0">
    <div class="flex items-center space-x-4 w-full sm:w-auto">
        <h2 class="text-xl font-medium text-slate-800 dark:text-navy-50 lg:text-2xl">
            Portfolio Holdings
        </h2>
        <div class="hidden h-full py-1 sm:flex">
            <div class="h-full w-px bg-slate-300 dark:bg-navy-600"></div>
        </div>
        <ul class="hidden flex-wrap items-center space-x-2 sm:flex">
            <li class="flex items-center space-x-2">
                <a class="text-primary transition-colors hover:text-primary-focus dark:text-accent-light dark:hover:text-accent" href="#">Investments</a>
                <svg xmlns="http://www.w3.org/2000/svg" class="size-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                </svg>
            </li>
            <li>Portfolio Investors</li>
        </ul>
    </div>
</div>

<div class="card p-4">
    <div class="flex flex-col sm:flex-row sm:items-end justify-between mb-4 space-y-4 sm:space-y-0">
        <div class="w-full sm:w-auto">
             <input id="filter-input" type="search" placeholder="Search Investor/PAN..." class="form-input w-full rounded-lg border border-slate-300 bg-transparent px-3 py-2 placeholder:text-slate-400/70 hover:border-slate-400 focus:border-primary dark:border-navy-450 dark:hover:border-navy-400 dark:focus:border-accent" />
        </div>
    </div>

    <div id="investor-grid"></div>
</div>
{% endblock %}

{% block javascript %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const gridData = {{ grid_data_json|safe }};
        const gridContainer = document.getElementById("investor-grid");

        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR' }).format(amount);
        };

        const gridConfig = {
            columns: [
                { id: 'name', name: 'Investor Name', width: '25%' },
                { id: 'pan', name: 'PAN', width: '15%' },
                { id: 'distributor', name: 'Distributor', width: '20%' },
                {
                    id: 'total_aum',
                    name: 'Total AUM',
                    formatter: (cell) => formatCurrency(cell)
                },
                {
                    id: 'action_url',
                    name: 'Action',
                    sort: false,
                    formatter: (cell) => {
                         return Gridjs.html(`
                            <a href="${cell}" class="btn h-8 rounded-full bg-primary/10 px-3 text-xs font-medium text-primary hover:bg-primary/20 focus:bg-primary/20 active:bg-primary/25">
                                View Portfolio
                            </a>
                        `);
                    }
                }
            ],
            data: gridData,
            search: false, // Custom search below
            sort: true,
            pagination: { limit: 10 },
            className: {
                table: 'is-hoverable w-full text-left',
                tbody: 'text-slate-600 dark:text-navy-200',
                thead: 'bg-slate-200 text-slate-800 dark:bg-navy-800 dark:text-navy-100',
            }
        };

        const grid = new Gridjs.Grid(gridConfig).render(gridContainer);

        const applyFilters = () => {
            const keyword = document.getElementById('filter-input').value.toLowerCase();
            let filtered = gridData.filter(row => {
                return (
                    (row.name && row.name.toLowerCase().includes(keyword)) ||
                    (row.pan && row.pan.toLowerCase().includes(keyword))
                );
            });
            grid.updateConfig({ data: filtered }).forceRender();
        };

        document.getElementById('filter-input').addEventListener('input', applyFilters);
    });
</script>
{% endblock %}
